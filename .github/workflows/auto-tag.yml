name: 🏷️ Auto tag

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - ".github/workflows/*.yml"

permissions:
  contents: read

concurrency:
  group: auto-tag-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag:
    name: Create date-based tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          fetch-depth: 0

      - name: 🏷️ Tag avec la date du jour
        run: |
          TAG="profile-$(date '+%Y.%m.%d')"

          # Vérifier si le tag existe déjà
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG déjà existant — skip"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Profile snapshot — $TAG"
          git push origin "$TAG"
          echo "✅ Tag créé : $TAG"
