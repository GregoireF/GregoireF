name: 📊 Metrics

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: metrics
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  metrics:
    name: Generate GitHub Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:

      - name: ⬇️ Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.METRICS_TOKEN || github.token }}
          fetch-depth: 0

      - name: 🏠 Base metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GregoireF
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          plugin_achievements: no
          config_timezone: Europe/Paris
          config_display: large
          filename: .cache/base.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update base [skip ci]"

      - name: 📊 Stats card
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GregoireF
          template: classic
          base: header
          base_indepth: yes
          plugin_achievements: no
          config_timezone: Europe/Paris
          config_display: large
          filename: .cache/stats.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update stats [skip ci]"

      - name: 🗣️ Languages
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GregoireF
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_achievements: no
          config_timezone: Europe/Paris
          filename: .cache/languages.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update languages [skip ci]"

      - name: ⏱️ WakaTime
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GregoireF
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 30
          plugin_wakatime_limit: 8
          plugin_wakatime_sections: time, projects, languages, editors
          plugin_wakatime_url: https://wakatime.com
          plugin_achievements: no
          config_timezone: Europe/Paris
          filename: .cache/wakatime.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update wakatime [skip ci]"

      - name: 📅 ISO Calendar
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GregoireF
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_achievements: no
          config_timezone: Europe/Paris
          filename: .cache/isocalendar.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update isocalendar [skip ci]"

      - name: 🔍 Issues & PRs followup
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GregoireF
          base: ""
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes
          plugin_achievements: no
          config_timezone: Europe/Paris
          filename: .cache/followup.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update followup [skip ci]"
