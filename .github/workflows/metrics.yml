name: 📊 Metrics

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  metrics:
    name: Generate GitHub Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:

      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          fetch-depth: 0

      - name: 🏠 Base metrics
        uses: lowlighter/metrics@v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GregoireF
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: Europe/Paris
          config_display: large
          filename: .cache/base.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update base [skip ci]"

      - name: 📅 ISO Calendar
        uses: lowlighter/metrics@v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GregoireF
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Europe/Paris
          filename: .cache/isocalendar.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update isocalendar [skip ci]"

      - name: 📰 Recent activity
        uses: lowlighter/metrics@v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GregoireF
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 6
          plugin_activity_days: 14
          plugin_activity_filter: all
          config_timezone: Europe/Paris
          filename: .cache/activity.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update activity [skip ci]"

      - name: 🔍 Issues & PRs followup
        uses: lowlighter/metrics@v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GregoireF
          base: ""
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_followup_indepth: yes
          config_timezone: Europe/Paris
          filename: .cache/followup.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update followup [skip ci]"

      - name: 🏅 Achievements
        uses: lowlighter/metrics@v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GregoireF
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0
          config_timezone: Europe/Paris
          filename: .cache/achievements.svg
          output_action: commit
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): update achievements [skip ci]"
