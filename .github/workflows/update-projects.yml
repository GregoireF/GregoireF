name: 📦 Update projects section

on:
  push:
    paths:
      - PROJECTS.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-projects
  cancel-in-progress: false

jobs:
  update:
    name: Regenerate projects table
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: 🐍 Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: 📝 Update README from PROJECTS.json
        run: python .github/scripts/update-projects.py

      - name: 💾 Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore(projects): sync from PROJECTS.json [skip ci]" &&
            git push
          )
