name: 📦 Update projects section

on:
  push:
    paths:
      - PROJECTS.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-projects
  cancel-in-progress: false

jobs:
  update:
    name: Regenerate projects table
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 🐍 Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: 📝 Update README from PROJECTS.json
        run: python .github/scripts/update-projects.py

      - name: 💾 Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore(projects): sync from PROJECTS.json [skip ci]" &&
            git push
          )
