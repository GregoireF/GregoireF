name: 📝 Lint

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "NOW.md"
      - ".markdownlint.json"
      - ".github/**"
  pull_request:
    paths:
      - "README.md"
      - "NOW.md"
      - ".markdownlint.json"
      - ".github/**"

permissions:
  contents: read

jobs:
  lint-markdown:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: 🔍 Lint README & NOW
        uses: DavidAnson/markdownlint-cli2-action@b4c9feab76d8025d1e83c653fa3990936df0e6c8 # v16.0.0
        with:
          globs: |
            README.md
            NOW.md
          config: ".markdownlint.json"

  lint-yaml:
    name: YAML lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: 🔍 Lint workflows YAML
        run: |
          pip install yamllint --quiet
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            .github/workflows/