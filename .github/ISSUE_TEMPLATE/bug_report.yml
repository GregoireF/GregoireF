name: 🐛 Bug report
description: Quelque chose ne fonctionne pas comme prévu
labels: ["bug", "triage"]
assignees: ["GregoireF"]

body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce bug.
        Remplis les champs ci-dessous avec le plus de détails possible.

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Décris clairement ce qui se passe.
      placeholder: "Ex : Le pipeline CI échoue lors du step de build Docker..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Liste les étapes précises qui mènent au bug.
      placeholder: |
        1. Aller sur...
        2. Cliquer sur...
        3. Observer...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Ce qui aurait dû se passer.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement observé
      description: Ce qui se passe réellement.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexte & environnement
      description: OS, version Node, version Docker, navigateur... tout ce qui peut aider.
      placeholder: |
        - OS : Ubuntu 24 / Windows 11
        - Node : v20.x
        - Docker : 26.x
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / captures d'écran
      description: Colle ici les logs d'erreur ou joins une capture d'écran.
      render: shell
    validations:
      required: false
